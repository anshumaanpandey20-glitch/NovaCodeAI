{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="auth-container">

    <div class="auth-box">

        <h2>Login</h2>

        <form method="POST" action="{{ url_for('auth.login') }}">

            <div class="input-group">

                <label>Email</label>

                <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                type="password"
                name="password"
                placeholder="Enter Password"
                required>

            </div>

            <button class="submit-btn">

                Login

            </button>

        </form>

        <div class="auth-footer">

            Don't have an account?

            <a href="/register">

                Register

            </a>

        </div>

    </div>

</div>

{% endblock %}
